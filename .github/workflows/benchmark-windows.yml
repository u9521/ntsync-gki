name: Build Windows benchmark

on:
  push:
    branches: ["**"]
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmark-windows.yml"
  pull_request:
    paths:
      - "benchmarks/**"
      - ".github/workflows/benchmark-windows.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64
      - name: Build x64 benchmark
        shell: cmd
        run: cl /nologo /std:c11 /O2 /W4 /TC /Fe:ntsync_bench.exe benchmarks\ntsync_bench.c
      - name: Smoke test
        shell: cmd
        run: ntsync_bench.exe --iterations 1000 --warmup 100 --threads 2 --csv-only
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ntsync-benchmark-windows-x64
          path: ntsync_bench.exe
          if-no-files-found: error
