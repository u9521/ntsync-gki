name: Build ntsync-gki

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v7
      - id: targets
        run: |
          echo "matrix=$(jq -c '{"include": .targets}' config/targets.json)" >> "$GITHUB_OUTPUT"
      - id: version
        shell: bash
        run: |
          version=0.0.1
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
              echo "Release tags must use vMAJOR.MINOR.PATCH" >&2
              exit 1
            }
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/build-target.yml
    with:
      target: ${{ matrix.id }}
      image: ${{ matrix.image }}

  package:
    needs: [prepare, build]
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, package]
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ github.ref_name }}
      version: ${{ needs.prepare.outputs.version }}
