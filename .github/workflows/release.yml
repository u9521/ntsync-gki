name: Create GitHub release

on:
  workflow_call:
    inputs:
      tag:
        description: Git tag to release.
        required: true
        type: string
      version:
        description: Module version in MAJOR.MINOR.PATCH format.
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: ntsync-gki
          path: dist
      - uses: actions/download-artifact@v8.0.1
        with:
          name: ntsync-benchmark-windows-x64
          path: dist
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$TAG" "dist/ntsync-gki-v$VERSION.zip" "dist/ntsync_bench.exe" \
            --repo "${{ github.repository }}" \
            --draft \
            --title "ntsync-gki $TAG" \
            --generate-notes
